# YOLOv12-seg-A2C2fMSCA-P4-Triplet-P5 🚀, AGPL-3.0 license
# 层级选择策略：P4 用 A2C2fMSCA（方向性 strip conv 适配中分辨率空间细节），
#               P5 用 A2C2fTriplet（跨维度交互，参数极少避免低分辨率过拟合）
# 灵感：PANet (Liu et al., CVPR 2018) 不同层使用不同增强策略

# Parameters
nc: 80  # number of classes
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

# YOLOv12-turbo backbone (P4=A2C2fMSCA, P5=A2C2fTriplet)
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,  [64, 3, 2]]             # 0-P1/2
  - [-1, 1, Conv,  [128, 3, 2, 1, 2]]      # 1-P2/4
  - [-1, 2, C3k2,  [256, False, 0.25]]
  - [-1, 1, Conv,  [256, 3, 2, 1, 4]]      # 3-P3/8
  - [-1, 2, C3k2,  [512, False, 0.25]]
  - [-1, 1, Conv,  [512, 3, 2]]            # 5-P4/16
  - [-1, 4, A2C2fMSCA, [512, True, 4]]     # 6 ★ P4 用 MSCA（空间方向性）
  - [-1, 1, Conv,  [1024, 3, 2]]           # 7-P5/32
  - [-1, 4, A2C2fTriplet, [1024, True, 1]] # 8 ★ P5 用 Triplet（跨维度）

# YOLOv12-turbo head (与 baseline 完全相同)
head:
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 6], 1, Concat, [1]]              # cat backbone P4
  - [-1, 2, A2C2f, [512, False, -1]]       # 11

  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]
  - [[-1, 4], 1, Concat, [1]]              # cat backbone P3
  - [-1, 2, A2C2f, [256, False, -1]]       # 14

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 11], 1, Concat, [1]]             # cat head P4
  - [-1, 2, A2C2f, [512, False, -1]]       # 17

  - [-1, 1, Conv, [512, 3, 2]]
  - [[-1, 8], 1, Concat, [1]]              # cat head P5
  - [-1, 2, C3k2, [1024, True]]            # 20 (P5/32-large)

  - [[14, 17, 20], 1, Segment, [nc, 32, 256]]  # Segment(P3, P4, P5)
